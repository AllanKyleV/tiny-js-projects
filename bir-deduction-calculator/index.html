<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIR Deduction Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <h1>BIR Deduction Calculator</h1>

    <section id="input">
        <label>Amount <input type="text" id="input"></label>
        <button id="calculate">Calculate</button>
    </section>
    
    <section id="supplies">
        <h2>Goods & Supplies</h2>

        <p>Gross: <span id="gross"></span></p>  
        <p>EWT 1%: <span id="gross"></span></p>
        <p>Final VAT 5%: <span id="gross"></span></p>
        <p>Net Amount: <span id="gross"></span></p>
    </section>

    <section id="meals">
        <h2>Meals & Snacks</h2>

        <p>Gross: <span id="gross"></span></p>
        <p>EWT 2%: <span id="gross"></span></p>
        <p>Final VAT 3%: <span id="gross"></span></p>
        <p>Net Amount: <span id="gross"></span></p>
    </section>
</body>
</html>
