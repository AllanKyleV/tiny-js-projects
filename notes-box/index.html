<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes box</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <h1>Notes Box</h1>
    <p>Mini-project: Create a notes box that automatically saves its contents and restores them on page load.</p>

    <label for="input">
        <span>Input Note: <input type="text" id="input-note"></span>
        <button id="add-btn">Add</button>
    </label>

    <label for="display-notes">
        <button id="retrieve-btn">Retrieve Notes</button>
        <p>Notes:</p>

        <span id="display-note"></span>
    </label>
</body>
</html>
