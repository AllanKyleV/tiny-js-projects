<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>

    <!--Calculator Section/Container-->
    <section id="calc-section">
        <h1>Tip Calculator</h1>

        <!--Calculator form-->
        <form id="calc-form">

            <p>Bill Amount:</p>
            <input type="text" id="bill-amount">

            <p>Tip Percentage:</p>
            <input type="text" id="tip-percentage">

            <button id="calc-btn">Calculate</button>

            <p>Tip: <span id="tip-display">0</span></p>

            <p>Total: <span id="result-display">0</span></p>

            <p><span id="error-display"></span></p>
        </form>

    </section>
</body>
</html>
