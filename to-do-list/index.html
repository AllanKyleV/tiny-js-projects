<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>

    <!--To-do list section.-->
    <section>
        <h1>To-Do List</h1>

        <h2>Create Task</h2>
        <!--Form.-->
        <form id="container">
            <input type="text"  id="input-task" placeholder="Input task...">

            <button id="create-task-btn">Add Task</button>
        </form>

        <h2>Tasks</h2>
        <!--Task List.-->

        <ul id="list-container"></ul>
    </section>
</body>
</html>
