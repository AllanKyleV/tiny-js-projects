<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <h1>Character Counter</h1>

    <section>
        <textarea name="" id="input-text" placeholder="Input here..."></textarea>

        <p>Character: <span id="display-char">0</span> / <span id="limit">200</span></p>
        
        <p>Words: <span id="display-word">0</span></p>

        <p>Lines: <span id="display-line">0</span></p>
    </section>
</body>
</html>
